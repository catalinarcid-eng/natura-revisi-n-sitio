name: Natura Precios Bot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar bot
        run: python precios_bot.py

      - name: Guardar JSON en el repositorio
        if: always()
        run: |
          git config --global user.name "NaturaPreciosBot"
          git config --global user.email "bot@natura.internal"
          git add productos_web.json || true
          if git diff --staged --quiet; then
            echo "Sin cambios para guardar."
          else
            git commit -m "Actualización automática de precios [skip ci]"
            git push
          fi
